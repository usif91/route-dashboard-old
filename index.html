<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Route Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <div class="wrap">
            <h1>🚦 Route Dashboard</h1>
            <div class="controls" style="display: flex; gap: 8px;">
                <input id="q" style="flex: 1;" type="search" placeholder='Search . Example: "3rd jef"'
                    autocomplete="off" />
                <button id="btnNear">Near me (top 5)</button>
            </div>
            <a href="report.html" class="report-link-btn">
                <span>📋</span> Report non-emergency issues
            </a>
            <div id="status" class="meta" style="margin-top:8px;"></div>
        </div>
    </header>

    <main>
        <div class="wrap">
            <div class="card">
                <table>
                    <colgroup>
                        <col class="route" />
                        <col class="yard" />
                        <col class="street" />
                    </colgroup>
                    <thead>
                        <tr>
                            <th>Route</th>
                            <th id="th-plan">Car</th>
                            <th>Intersection</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
                <div class="actions">
                    <div class="left-actions">
                        <button id="btnMore">Load more</button>
                        <span class="note" id="shownNote">—</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <span class="version-tag">v3.0</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>

</html>
